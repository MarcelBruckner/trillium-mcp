name: Validate diagrams

# Validate that the PlantUML sources under docs/ still render cleanly.
# PNGs are NOT committed here: the pre-commit hook (.githooks/pre-commit)
# re-renders any out-of-date diagram locally, so committed PNGs already match
# their source. CI only guards against a .puml that fails to render.

on:
  push:
    branches: [main]
    paths:
      - "docs/**.puml"
      - "docs/**.iuml"
      - ".github/workflows/render-diagrams.yml"
  pull_request:
    paths:
      - "docs/**.puml"
      - "docs/**.iuml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-diagrams-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends plantuml graphviz

      - name: Render diagrams (verify they compile)
        run: plantuml -tpng -o /tmp/diagram-check docs/*.puml
