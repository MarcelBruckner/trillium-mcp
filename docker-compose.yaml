# Running `docker-compose up` will create/use the "trilium-data" directory in the user home
# Run `TRILIUM_DATA_DIR=/path/of/your/choice docker-compose up` to set a different directory
# To run in the background, use `docker-compose up -d`
services:
  trilium:
    # Optionally, replace `latest` with a version tag like `v0.90.3`
    # Using `latest` may cause unintended updates to the container
    image: triliumnext/trilium:latest
    # Restart the container unless it was stopped by the user
    restart: unless-stopped
    ports:
      # By default, Trilium will be available at http://localhost:8080
      # It will also be accessible at http://<host-ip>:8080
      # You might want to limit this with something like Docker Networks, reverse proxies, or firewall rules,
      # however be aware that using UFW is known to not work with default Docker installations, see:
      # https://docs.docker.com/engine/network/packet-filtering-firewalls/#docker-and-ufw
      - '8080:8080'
    volumes:
      # Unless TRILIUM_DATA_DIR is set, the data will be stored in the "trilium-data" directory in the home directory.
      # This can also be changed with by replacing the line below with `- /path/of/your/choice:/home/node/trilium-data
      - ./trilium-data:/home/node/trilium-data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

  # MCP server sidecar: exposes the Trilium ETAPI as MCP tools over HTTP.
  # Reaches Trilium over the internal compose network (service name "trilium").
  mcp:
    build: .
    restart: unless-stopped
    depends_on:
      - trilium
    environment:
      # Talk to Trilium over the internal network, not the published port.
      TRILIUM_SERVER_URL: http://trilium:8080
      # Required: ETAPI token (Trilium -> Options -> ETAPI). Set it in .env.
      TRILIUM_ETAPI_TOKEN: ${TRILIUM_ETAPI_TOKEN:?set TRILIUM_ETAPI_TOKEN in your .env}
      # Optional: protect the MCP endpoint with a bearer token (empty = open).
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}
    ports:
      # MCP endpoint at http://localhost:8000/mcp
      - '8000:8000'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
